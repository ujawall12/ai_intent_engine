version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: springminds-db
    environment:
      POSTGRES_DB: intentdb
      POSTGRES_USER: springminds
      POSTGRES_PASSWORD: springminds123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springminds -d intentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: